<!DOCTYPE html>
<html lang="th">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&family=Kanit:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f0f4f8; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
        }
        .wrapper { 
            max-width: 550px; 
            width: 100%; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(13, 148, 136, 0.1); 
        }
        h1 { 
            font-family: 'Kanit', sans-serif; 
            color: #0d9488; 
            font-size: 24px; 
            text-align: center; 
            margin: 0 0 5px 0; 
        }
        .subtitle { 
            color: #64748b; 
            font-size: 14px; 
            text-align: center; 
            margin: 0 0 25px 0; 
            font-weight: 500;
        }
        .section-title { 
            font-family: 'Kanit', sans-serif; 
            font-size: 16px; 
            color: #1e293b; 
            background: #f8fafc; 
            padding: 8px 14px; 
            border-left: 4px solid #0d9488; 
            margin: 20px 0 10px 0; 
            border-radius: 0 6px 6px 0;
        }
        .checkbox-group { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 14px; 
            border-bottom: 1px solid #f1f5f9; 
            cursor: pointer; 
            border-radius: 8px;
            transition: background 0.2s;
        }
        .checkbox-group:hover { 
            background: #f0fdfa; 
        }
        .checkbox-group label { 
            font-size: 15px; 
            color: #334155; 
            cursor: pointer; 
            flex-grow: 1; 
            padding-right: 15px;
        }
        .checkbox-group input { 
            width: 20px; 
            height: 20px; 
            accent-color: #0d9488; 
            cursor: pointer; 
        }
        .result-box { 
            background: #f8fafc; 
            border: 2px solid #e2e8f0; 
            border-radius: 16px; 
            padding: 22px; 
            text-align: center; 
            margin-top: 30px; 
            transition: all 0.3s ease;
        }
        .score-display { 
            font-family: 'Kanit', sans-serif; 
            font-size: 54px; 
            color: #475569; 
            font-weight: bold; 
            margin: 5px 0; 
            line-height: 1;
        }
        .interpretation { 
            font-family: 'Kanit', sans-serif;
            font-weight: 600; 
            font-size: 18px; 
            margin-top: 10px; 
        }
        .clinical-guide {
            font-size: 14px;
            color: #64748b;
            margin-top: 8px;
            line-height: 1.5;
            text-align: left;
            background: rgba(255,255,255,0.7);
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .footer { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 12px; 
            color: #94a3b8; 
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>📊 Alvarado Score Calculator</h1>
    <p class="subtitle">ระบบประเมินความน่าจะเป็นของภาวะไส้ติ่งอักเสบเฉียบพลัน รพ.ตาคลี</p>

        <input type="checkbox" id="sym1" value="1" onchange="calculateAlvarado()">
    </div>
    
    <div class="checkbox-group">

        <input type="checkbox" id="sym2" value="1" onchange="calculateAlvarado()">
    </div>

        <input type="checkbox" id="sym3" value="1" onchange="calculateAlvarado()">
    </div>
